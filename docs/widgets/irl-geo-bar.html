<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<div id="geo-bar">
  <div class="stat" id="speed-block">
    <div class="stat-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 12m-1 0a1 1 0 1 0 2 0a1 1 0 1 0 -2 0"/>
        <path d="M12 12l3 -4"/>
        <path d="M6.387 16.387a7 7 0 1 1 11.226 0"/>
      </svg>
    </div>
    <div class="stat-content">
      <div class="stat-row">
        <span class="stat-value" id="speed-val">--</span>
        <span class="stat-unit" id="speed-unit">km/h</span>
      </div>
      <div class="stat-label">Speed</div>
    </div>
  </div>

  <div class="divider" id="weather-divider"></div>

  <div class="stat" id="weather-block">
    <div class="stat-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        <circle cx="12" cy="12" r="4"/>
      </svg>
    </div>
    <div class="stat-content">
      <div class="stat-row">
        <span class="stat-value" id="weather-temp">--</span>
        <span class="stat-unit" id="weather-temp-unit">°C</span>
      </div>
      <div class="stat-label" id="weather-desc">Weather</div>
    </div>
  </div>

  <div class="divider" id="location-divider"></div>

  <div class="stat" id="location-block">
    <div class="stat-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C8.686 2 6 4.686 6 8c0 4.5 6 12 6 12s6-7.5 6-12c0-3.314-2.686-6-6-6z"/>
        <circle cx="12" cy="8" r="2"/>
      </svg>
    </div>
    <div class="stat-content">
      <div class="stat-row">
        <span class="stat-value location-val" id="location-val">--</span>
      </div>
      <div class="stat-label">Location</div>
    </div>
  </div>

  <div class="divider" id="dist-divider"></div>

  <div class="stat" id="distance-block">
    <div class="stat-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 18 0a9 9 0 0 0 -18 0"/>
        <path d="M12 7v5l2.5 2.5"/>
      </svg>
    </div>
    <div class="stat-content">
      <div class="stat-row">
        <span class="stat-value" id="distance-val">--</span>
      </div>
      <div class="stat-label">Distance</div>
    </div>
  </div>

</div>
