name: Bug Report
description: Something's broken. It shouldn't be. Let's fix it.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before you type — [search existing issues](https://github.com/streamwizard/streamwizard/issues) first. Someone may have already reported it.

        You can also report bugs directly from Discord using the StreamWizard bot — `/bug` in the [StreamWizard Discord](https://discord.gg/29Eq659egv). It creates the same GitHub issue, no browser required.
        For general help or questions, Discord is faster than a GitHub issue.

  - type: dropdown
    id: area
    attributes:
      label: Where did it break?
      description: Pick the part of StreamWizard that's misbehaving.
      options:
        - web-streamwizard (main web app)
        - web-overlay (Twitch overlay)
        - web-monitor (monitoring dashboard)
        - rest-api
        - streamwizard-bot
        - ws-server
        - Database / Supabase
        - Other / unsure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What broke?
      description: Clear and specific. "It doesn't work" is not a bug report.
      placeholder: Describe what went wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: How do we reproduce it?
      description: Walk us through it. The more exact, the faster we can fix it.
      placeholder: |
        1. Go to '...'
        2. Do '...'
        3. Watch it fall apart
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      placeholder: What were you actually expecting?
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: bun_version
    attributes:
      label: Bun version
      placeholder: "run: bun --version"

  - type: input
    id: sw_version
    attributes:
      label: StreamWizard version / commit
      placeholder: "e.g. v1.2.0 or a commit hash"

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: If there's an error in the console or a screenshot that shows the mess, paste it here.
      render: shell

  - type: checkboxes
    id: preflight
    attributes:
      label: Quick checks
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I can reproduce this consistently (not a one-off fluke).
          required: false
