name: PR Check

on:
  pull_request:
    branches:
      - staging
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - "tsconfig*.json"

jobs:
  check:
    name: Lint, Types & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install

      - name: Type-check & build (affected only)
        run: SKIP_ENV_VALIDATION=true bun x turbo run check-types build --filter=...[origin/${{ github.base_ref }}]
