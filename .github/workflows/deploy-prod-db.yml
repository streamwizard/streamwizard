name: Deploy Production Database Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@4819d808ab99e5cde19a0637a16536a4038fad73 # v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2.1.1
        with:
          version: 2.104.0

      - name: Push Migrations to Production Supabase
        run: |
          doppler run --command="supabase db push --db-url \$SUPABASE_DB_URL --yes"
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}