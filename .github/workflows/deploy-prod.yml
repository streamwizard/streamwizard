name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build Check"]
    types:
      - completed
    branches:
      - main

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Merge main into production
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin production
          git checkout production
          # Use --no-ff so the deploy still succeeds when production has its own
          # commits (e.g. older staging merges) and can't be fast-forwarded.
          git merge origin/main --no-ff -m "Deploy: merge main into production"
          git push origin production
