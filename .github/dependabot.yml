version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/rest-api"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/streamwizard-bot"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/ws-server"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/web-streamwizard"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"

  - package-ecosystem: "docker"
    directory: "/apps/web-overlay"
    schedule:
      interval: "weekly"
    target-branch: "staging"
    labels:
      - "dependencies"
